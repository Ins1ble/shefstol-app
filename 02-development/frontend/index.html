<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Запрет кэширования -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Шеф-стол</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Экран входа -->
        <div id="screen-login" class="screen active"></div>
        <!-- Главный экран с таб-баром -->
        <div id="screen-main" class="screen">
            <div class="tab-content-area">
                <div id="tab-slots" class="tab-pane active"></div>
                <div id="tab-bookings" class="tab-pane" style="display:none;"></div>
                <div id="tab-profile" class="tab-pane" style="display:none;"></div>
            </div>
            <div class="tab-bar">
                <a href="#" class="tab active" data-tab="slots">Классы</a>
                <a href="#" class="tab" data-tab="bookings">Мои записи</a>
                <a href="#" class="tab" data-tab="profile">Профиль</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/slots.js"></script>
    <script src="/js/booking.js"></script>
    <script src="/js/mybookings.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
